<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazada API Test Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .test-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .test-section h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .test-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .product-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s;
            background: white;
        }

        .product-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #f5f5f5;
        }

        .product-name {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 40px;
        }

        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
        }

        .product-platform {
            display: inline-block;
            padding: 4px 8px;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
        }

        .stat-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Lazada API Test Dashboard</h1>
            <p>API Running on: <strong>http://localhost:8000</strong></p>
        </div>

        <div class="test-section">
            <h2>📊 API Statistics</h2>
            <div class="stats">
                <div class="stat-card">
                    <h3>Tests Run</h3>
                    <div class="value" id="testsRun">0</div>
                </div>
                <div class="stat-card">
                    <h3>Successful</h3>
                    <div class="value" id="successful">0</div>
                </div>
                <div class="stat-card">
                    <h3>Avg Response Time</h3>
                    <div class="value" id="avgTime">-</div>
                </div>
            </div>
        </div>

        <div class="test-section">
            <h2>🔍 Test Search</h2>
            <div class="test-controls">
                <div class="input-group">
                    <label>Search Query</label>
                    <input type="text" id="query" value="phone" placeholder="Enter search term">
                </div>
                <div class="input-group">
                    <label>Results Per Page</label>
                    <input type="number" id="results" value="10" min="1" max="100">
                </div>
                <div class="input-group">
                    <label>Page Number</label>
                    <input type="number" id="page" value="1" min="1" max="50">
                </div>
                <div class="input-group">
                    <label>Sort By</label>
                    <select id="sortBy">
                        <option value="best_match">Best Match</option>
                        <option value="price_asc">Price: Low to High</option>
                        <option value="price_desc">Price: High to Low</option>
                    </select>
                </div>
                <div class="input-group" style="display: flex; align-items: flex-end;">
                    <button class="btn btn-primary" onclick="runTest()" id="testBtn">
                        🔍 Search
                    </button>
                </div>
            </div>
        </div>

        <div class="test-section">
            <h2>📦 Results</h2>
            <div id="resultsContainer">
                <p style="text-align: center; color: #999; padding: 40px;">
                    Click "Search" to see products
                </p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        let stats = { testsRun: 0, successful: 0, totalTime: 0 };

        function updateStats() {
            document.getElementById('testsRun').textContent = stats.testsRun;
            document.getElementById('successful').textContent = stats.successful;
            
            if (stats.successful > 0) {
                const avgTime = (stats.totalTime / stats.successful).toFixed(2);
                document.getElementById('avgTime').textContent = avgTime + 's';
            }
        }

        async function runTest() {
            const query = document.getElementById('query').value;
            const perPage = document.getElementById('results').value;
            const page = document.getElementById('page').value;
            const sortBy = document.getElementById('sortBy').value;
            const btn = document.getElementById('testBtn');
            
            if (!query) {
                alert('Please enter a search query');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Searching...';
            
            document.getElementById('resultsContainer').innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">Searching Lazada... This takes 6-8 seconds...</p>';
            
            try {
                const url = `${API_BASE_URL}/search?q=${encodeURIComponent(query)}&per_page=${perPage}&page=${page}&sort_by=${sortBy}`;
                
                const startTime = Date.now();
                const response = await fetch(url);
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
                
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }
                
                const data = await response.json();
                
                stats.testsRun++;
                stats.successful++;
                stats.totalTime += parseFloat(elapsed);
                updateStats();
                
                displayResults(data, elapsed);
                
            } catch (error) {
                stats.testsRun++;
                updateStats();
                
                document.getElementById('resultsContainer').innerHTML = `
                    <p style="text-align: center; color: #ef5350; padding: 40px;">
                        ❌ Test failed: ${error.message}<br><br>
                        Make sure the API is running on port 8000
                    </p>
                `;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔍 Search';
            }
        }

        function displayResults(data, elapsed) {
            const container = document.getElementById('resultsContainer');
            
            if (!data.results || data.results.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">No products found. Try a different search query.</p>';
                return;
            }
            
            const summary = `
                <div style="background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <strong>Search:</strong> "${data.query}"<br>
                    <strong>Total Found:</strong> ${data.total_results.toLocaleString()} products<br>
                    <strong>Showing:</strong> ${data.results.length} products (Page ${data.page})<br>
                    <strong>Response Time:</strong> ${elapsed}s
                </div>
            `;
            
            const html = summary + `
                <div class="product-grid">
                    ${data.results.map(product => `
                        <div class="product-card">
                            <a href="${product.product_url}" target="_blank">
                                <img src="${product.image_url || 'https://via.placeholder.com/250x200?text=No+Image'}" 
                                     alt="${product.product_name}" 
                                     class="product-image"
                                     onerror="this.src='https://via.placeholder.com/250x200?text=No+Image'">
                            </a>
                            <div class="product-name" title="${product.product_name}">${product.product_name}</div>
                            <div class="product-price">₱${product.current_price.toLocaleString()}</div>
                            <span class="product-platform">${product.platform}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            
            container.innerHTML = html;
        }

        // Auto-test on load
        window.addEventListener('load', () => {
            console.log('Dashboard loaded! API should be running at http://localhost:8000');
        });
    </script>
</body>
</html>
