<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Tracking Fix</title>
</head>
<body>
    <h1>Test Tracking API Fix</h1>
    <div id="result"></div>

    <script>
        // Test the tracking API with the correct data structure
        async function testTracking() {
            const resultDiv = document.getElementById('result');
            
            try {
                // Mock product data (like what comes from search)
                const mockProduct = {
                    product_name: "Test iPhone 15",
                    product_url: "https://www.lazada.com.ph/products/test-iphone-15",
                    platform: "lazada",
                    current_price: 50000.00,
                    currency: "PHP",
                    image_url: "https://example.com/iphone.jpg"
                };
                
                // Create the request payload with correct field names
                const requestPayload = {
                    product_name: mockProduct.product_name,
                    product_url: mockProduct.product_url,
                    platform: mockProduct.platform,
                    current_price: mockProduct.current_price,
                    currency: mockProduct.currency,
                    price_threshold: 45000.00, // Target price
                    image_url: mockProduct.image_url
                };
                
                resultDiv.innerHTML = `
                    <h2>✅ Fixed Data Structure</h2>
                    <h3>Request Payload:</h3>
                    <pre>${JSON.stringify(requestPayload, null, 2)}</pre>
                    
                    <h3>Key Fixes Applied:</h3>
                    <ul>
                        <li>✅ Changed frontend ID type from <code>number</code> to <code>string</code> (UUID)</li>
                        <li>✅ Changed field name from <code>threshold_price</code> to <code>price_threshold</code></li>
                        <li>✅ Made <code>is_available</code> and <code>price_drop_detected</code> optional</li>
                        <li>✅ Updated all component interfaces to use string IDs</li>
                        <li>✅ Fixed field name mismatches between frontend and backend</li>
                    </ul>
                    
                    <h3>Expected Backend Response:</h3>
                    <pre>{
  "id": "123e4567-e89b-12d3-a456-426614174000",
  "user_id": "456e7890-e89b-12d3-a456-426614174001", 
  "platform": "lazada",
  "product_url": "https://www.lazada.com.ph/products/test-iphone-15",
  "product_name": "Test iPhone 15",
  "current_price": 50000.00,
  "price_threshold": 45000.00,
  "currency": "PHP",
  "image_url": "https://example.com/iphone.jpg",
  "last_checked": null,
  "created_at": "2024-01-01T12:00:00Z"
}</pre>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `<h2>❌ Error:</h2><pre>${error.message}</pre>`;
            }
        }
        
        // Run test on page load
        testTracking();
    </script>
</body>
</html>
