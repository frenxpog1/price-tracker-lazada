<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Threshold Update Fix</title>
</head>
<body>
    <h1>Test Threshold Update API Fix</h1>
    <div id="result"></div>

    <script>
        // Test the threshold update API with the correct data structure
        async function testThresholdUpdate() {
            const resultDiv = document.getElementById('result');
            
            try {
                // Mock data for threshold update
                const productId = "123e4567-e89b-12d3-a456-426614174000"; // UUID string
                const newThreshold = 45000.00;
                
                // Create the request payload with correct field name
                const requestPayload = {
                    price_threshold: newThreshold // ✅ Correct field name (was threshold_price)
                };
                
                // Mock API endpoint
                const apiEndpoint = `/api/tracking/products/${productId}/threshold`;
                
                resultDiv.innerHTML = `
                    <h2>✅ Fixed Threshold Update Data Structure</h2>
                    
                    <h3>API Endpoint:</h3>
                    <code>PATCH ${apiEndpoint}</code>
                    
                    <h3>Request Payload:</h3>
                    <pre>${JSON.stringify(requestPayload, null, 2)}</pre>
                    
                    <h3>Key Fixes Applied:</h3>
                    <ul>
                        <li>✅ Changed field name from <code>threshold_price</code> to <code>price_threshold</code></li>
                        <li>✅ Using UUID string for product ID: <code>${productId}</code></li>
                        <li>✅ Proper decimal number format: <code>${newThreshold}</code></li>
                        <li>✅ Correct API endpoint path: <code>/products/{id}/threshold</code></li>
                    </ul>
                    
                    <h3>Backend Schema Expected:</h3>
                    <pre>{
  "price_threshold": 45000.00  // ✅ Decimal field, must be > 0
}</pre>
                    
                    <h3>Expected Response:</h3>
                    <pre>{
  "id": "${productId}",
  "user_id": "456e7890-e89b-12d3-a456-426614174001",
  "platform": "lazada",
  "product_url": "https://example.com/product",
  "product_name": "Test Product",
  "current_price": 50000.00,
  "price_threshold": 45000.00,  // ✅ Updated value
  "currency": "PHP",
  "image_url": "https://example.com/image.jpg",
  "last_checked": "2024-01-01T12:00:00Z",
  "created_at": "2024-01-01T10:00:00Z"
}</pre>

                    <h3>Frontend Service Function:</h3>
                    <pre>export async function updateThreshold(
  productId: string,        // ✅ UUID string
  thresholdPrice: number    // ✅ Number value
): Promise&lt;TrackedProduct&gt; {
  const request = {
    price_threshold: thresholdPrice  // ✅ Correct field name
  };
  
  const response = await api.patch(
    \`/tracking/products/\${productId}/threshold\`,
    request
  );
  return response.data;
}</pre>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `<h2>❌ Error:</h2><pre>${error.message}</pre>`;
            }
        }
        
        // Run test on page load
        testThresholdUpdate();
    </script>
</body>
</html>
